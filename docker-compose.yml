services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    # Postgres (unlike the SQLite dev path) is never auto-created by
    # main.py's create_all — run the real alembic migration first, same as
    # you'd need to do against Supabase in production.
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    environment:
      # Postgres by default, so local dev actually exercises the same
      # driver/schema path as Supabase in production instead of only ever
      # running against SQLite. Override DATABASE_URL in config/.env if you
      # specifically want the SQLite path (e.g. quick one-off scripts).
      - DATABASE_URL=postgresql://dukastock:dukastock@postgres:5432/dukastock
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=development
    env_file:
      - config/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/app

  postgres:
    image: postgres:16-alpine
    ports:
      # Host-side 5434, not 5432: plenty of dev machines already run a
      # native/other Postgres on the default port. Doesn't affect the
      # backend service above — it talks to this container over the
      # internal compose network at postgres:5432, unaffected by the host
      # port mapping. Only matters if you're connecting a host DB client.
      - "5434:5432"
    environment:
      - POSTGRES_USER=dukastock
      - POSTGRES_PASSWORD=dukastock
      - POSTGRES_DB=dukastock
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dukastock"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  redis_data:
  postgres_data:
