<svg viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#37474f"/>
    </marker>
  </defs>

  <text x="450" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#0d1f15">Use Case Diagram</text>

  <!-- System boundary -->
  <rect x="220" y="60" width="500" height="430" rx="10" fill="#fafafa" stroke="#37474f" stroke-width="1.5"/>
  <text x="320" y="85" text-anchor="middle" font-size="13" font-weight="bold" fill="#37474f">DukaStock System</text>

  <!-- Actor: Duka Operator -->
  <g transform="translate(60,230)">
    <circle cx="20" cy="0" r="14" fill="none" stroke="#1a6e3c" stroke-width="2"/>
    <line x1="20" y1="14" x2="20" y2="55" stroke="#1a6e3c" stroke-width="2"/>
    <line x1="0" y1="30" x2="40" y2="30" stroke="#1a6e3c" stroke-width="2"/>
    <line x1="20" y1="55" x2="0" y2="85" stroke="#1a6e3c" stroke-width="2"/>
    <line x1="20" y1="55" x2="40" y2="85" stroke="#1a6e3c" stroke-width="2"/>
    <text x="20" y="105" text-anchor="middle" font-size="12" font-weight="bold">Duka Operator</text>
  </g>

  <!-- Actor: System Administrator -->
  <g transform="translate(60,400)">
    <circle cx="20" cy="0" r="14" fill="none" stroke="#1565c0" stroke-width="2"/>
    <line x1="20" y1="14" x2="20" y2="55" stroke="#1565c0" stroke-width="2"/>
    <line x1="0" y1="30" x2="40" y2="30" stroke="#1565c0" stroke-width="2"/>
    <line x1="20" y1="55" x2="0" y2="85" stroke="#1565c0" stroke-width="2"/>
    <line x1="20" y1="55" x2="40" y2="85" stroke="#1565c0" stroke-width="2"/>
    <text x="20" y="105" text-anchor="middle" font-size="11" font-weight="bold">System</text>
    <text x="20" y="118" text-anchor="middle" font-size="11" font-weight="bold">Administrator</text>
  </g>

  <!-- Use cases (ellipses) -->
  <ellipse cx="420" cy="140" rx="110" ry="38" fill="#eaf6ee" stroke="#1a6e3c" stroke-width="1.5"/>
  <text x="420" y="135" text-anchor="middle" font-size="12" font-weight="bold">Log Sales</text>
  <text x="420" y="152" text-anchor="middle" font-size="10" fill="#455a64">via WhatsApp or USSD</text>

  <ellipse cx="420" cy="240" rx="120" ry="38" fill="#eaf6ee" stroke="#1a6e3c" stroke-width="1.5"/>
  <text x="420" y="235" text-anchor="middle" font-size="12" font-weight="bold">Request Restock Advice</text>
  <text x="420" y="252" text-anchor="middle" font-size="10" fill="#455a64">via WhatsApp or USSD</text>

  <ellipse cx="420" cy="335" rx="115" ry="38" fill="#eaf6ee" stroke="#1a6e3c" stroke-width="1.5"/>
  <text x="420" y="330" text-anchor="middle" font-size="12" font-weight="bold">Receive Weekly Summary</text>
  <text x="420" y="347" text-anchor="middle" font-size="10" fill="#455a64">delivered via outbound SMS</text>

  <ellipse cx="620" cy="400" rx="105" ry="35" fill="#e8f0fe" stroke="#1565c0" stroke-width="1.5"/>
  <text x="620" y="404" text-anchor="middle" font-size="12" font-weight="bold">Monitor System Logs</text>

  <ellipse cx="620" cy="465" rx="120" ry="35" fill="#e8f0fe" stroke="#1565c0" stroke-width="1.5"/>
  <text x="620" y="460" text-anchor="middle" font-size="11" font-weight="bold">Retrain Forecasting Models</text>
  <text x="620" y="475" text-anchor="middle" font-size="9" fill="#455a64">via GitHub Actions pipeline</text>

  <!-- Actor -> use case associations -->
  <line x1="95" y1="255" x2="310" y2="150" stroke="#37474f" stroke-width="1.3"/>
  <line x1="95" y1="265" x2="300" y2="240" stroke="#37474f" stroke-width="1.3"/>
  <line x1="95" y1="280" x2="305" y2="330" stroke="#37474f" stroke-width="1.3"/>

  <line x1="95" y1="430" x2="515" y2="400" stroke="#37474f" stroke-width="1.3"/>
  <line x1="95" y1="440" x2="500" y2="465" stroke="#37474f" stroke-width="1.3"/>

  <!-- Note on Log Sales -->
  <rect x="500" y="55" width="210" height="78" rx="6" fill="#fff8e1" stroke="#f9a825" stroke-width="1.3" stroke-dasharray="4,2"/>
  <text x="510" y="70" font-size="9.5" fill="#5d4037">Note: WhatsApp input routes</text>
  <text x="510" y="83" font-size="9.5" fill="#5d4037">through the NLP parser; USSD</text>
  <text x="510" y="96" font-size="9.5" fill="#5d4037">input routes through the FSM</text>
  <text x="510" y="109" font-size="9.5" fill="#5d4037">menu directly to the sales log</text>
  <text x="510" y="122" font-size="9.5" fill="#5d4037">without NLP processing.</text>
  <line x1="500" y1="93" x2="420" y2="120" stroke="#f9a825" stroke-width="1" stroke-dasharray="3,2"/>

  <text x="870" y="545" text-anchor="end" font-size="9" fill="#90a4ae" font-style="italic">Figure 4</text>
</svg>
