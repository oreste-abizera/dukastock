<svg xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif" viewBox="0 0 1000 620"><defs><marker id="arrow" markerHeight="10" markerUnits="strokeWidth" markerWidth="10" orient="auto" refX="8" refY="3"><path fill="#37474f" d="M0,0 L8,3 L0,6 Z"/></marker></defs><text x="500" y="32" fill="#0d1f15" font-size="20" font-weight="bold" text-anchor="middle">DukaStock System Architecture Overview</text><rect width="940" height="110" x="30" y="60" fill="#eaf6ee" stroke="#1a6e3c" stroke-width="1.5" rx="8"/><text x="50" y="82" fill="#0d1f15" font-size="13" font-weight="bold">Frontend / Input Layer</text><rect width="270" height="65" x="50" y="95" fill="#fff" stroke="#25a65a" stroke-width="1.5" rx="6"/><text x="185" y="118" font-size="13" font-weight="bold" text-anchor="middle">WhatsApp</text><text x="185" y="135" fill="#455a64" font-size="11" text-anchor="middle">Twilio sandbox</text><text x="185" y="150" fill="#607d8b" font-size="10" text-anchor="middle">Conversational sales logging (NLP)</text><rect width="270" height="65" x="365" y="95" fill="#fff" stroke="#25a65a" stroke-width="1.5" rx="6"/><text x="500" y="118" font-size="13" font-weight="bold" text-anchor="middle">USSD</text><text x="500" y="135" fill="#455a64" font-size="11" text-anchor="middle">Africa&apos;s Talking (MTN / Airtel RW)</text><text x="500" y="150" fill="#607d8b" font-size="10" text-anchor="middle">Structured Kinyarwanda FSM menu, no NLP</text><rect width="270" height="65" x="680" y="95" fill="#fff" stroke="#25a65a" stroke-width="1.5" rx="6"/><text x="815" y="118" font-size="13" font-weight="bold" text-anchor="middle">SMS (outbound)</text><text x="815" y="135" fill="#455a64" font-size="11" text-anchor="middle">Africa&apos;s Talking</text><text x="815" y="150" fill="#607d8b" font-size="10" text-anchor="middle">Weekly restock summaries</text><rect width="940" height="150" x="30" y="200" fill="#e8f0fe" stroke="#1565c0" stroke-width="1.5" rx="8"/><text x="50" y="222" fill="#0d1f15" font-size="13" font-weight="bold">Backend (FastAPI, single shared service)</text><rect width="195" height="95" x="50" y="235" fill="#fff" stroke="#1565c0" stroke-width="1.5" rx="6"/><text x="147" y="258" font-size="12" font-weight="bold" text-anchor="middle">Webhook Router</text><text x="147" y="276" fill="#455a64" font-size="10" text-anchor="middle">Async Twilio +</text><text x="147" y="290" fill="#455a64" font-size="10" text-anchor="middle">Africa&apos;s Talking</text><text x="147" y="304" fill="#455a64" font-size="10" text-anchor="middle">event handling</text><rect width="195" height="95" x="270" y="235" fill="#fff" stroke="#1565c0" stroke-width="1.5" rx="6"/><text x="367" y="258" font-size="12" font-weight="bold" text-anchor="middle">NLP Parser</text><text x="367" y="276" fill="#455a64" font-size="10" text-anchor="middle">XLM-R (fine-tuned)</text><text x="367" y="290" fill="#455a64" font-size="10" text-anchor="middle">+ RapidFuzz fallback</text><text x="367" y="304" fill="#455a64" font-size="10" text-anchor="middle">WhatsApp only</text><rect width="195" height="95" x="490" y="235" fill="#fff" stroke="#1565c0" stroke-width="1.5" rx="6"/><text x="587" y="258" font-size="12" font-weight="bold" text-anchor="middle">Forecasting Service</text><text x="587" y="276" fill="#455a64" font-size="10" text-anchor="middle">joblib-serialized</text><text x="587" y="290" fill="#455a64" font-size="10" text-anchor="middle">per-product models</text><text x="587" y="304" fill="#455a64" font-size="10" text-anchor="middle">(SerializableForecastModel)</text><rect width="240" height="95" x="710" y="235" fill="#fff" stroke="#1565c0" stroke-width="1.5" rx="6"/><text x="830" y="258" font-size="12" font-weight="bold" text-anchor="middle">Response Formatter</text><text x="830" y="276" fill="#455a64" font-size="10" text-anchor="middle">Kinyarwanda responses</text><text x="830" y="290" fill="#455a64" font-size="10" text-anchor="middle">USSD: 182 chars max</text><text x="830" y="304" fill="#455a64" font-size="10" text-anchor="middle">SMS: 160 chars max</text><rect width="940" height="110" x="30" y="385" fill="#fff3e0" stroke="#e65100" stroke-width="1.5" rx="8"/><text x="50" y="407" fill="#0d1f15" font-size="13" font-weight="bold">Database Layer</text><rect width="430" height="65" x="50" y="420" fill="#fff" stroke="#e65100" stroke-width="1.5" rx="6"/><text x="265" y="443" font-size="13" font-weight="bold" text-anchor="middle">Supabase (PostgreSQL)</text><text x="265" y="460" fill="#455a64" font-size="10" text-anchor="middle">Sales logs, shopkeeper profiles, forecast results</text><text x="265" y="473" fill="#bf360c" font-size="10" text-anchor="middle">Phone numbers hashed to UUID (Law No. 058/2021)</text><rect width="440" height="65" x="510" y="420" fill="#fff" stroke="#e65100" stroke-width="1.5" rx="6"/><text x="730" y="443" font-size="13" font-weight="bold" text-anchor="middle">Redis (Upstash)</text><text x="730" y="460" fill="#455a64" font-size="10" text-anchor="middle">USSD session state persistence</text><text x="730" y="473" fill="#455a64" font-size="10" text-anchor="middle">180-second TTL (matches MTN/Airtel timeout window)</text><rect width="940" height="75" x="30" y="525" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.5" rx="8"/><text x="50" y="547" fill="#0d1f15" font-size="13" font-weight="bold">Infrastructure</text><text x="50" y="568" fill="#455a64" font-size="11">Railway.app (always-on hosting — avoids Render.com&apos;s cold-start latency, which would breach USSD&apos;s 3-second response SLA)</text><text x="50" y="585" fill="#455a64" font-size="11">GitHub Actions CI/CD on push to main (lint, 71 unit tests, Docker build)</text><line x1="185" x2="185" y1="160" y2="235" stroke="#37474f" stroke-width="1.5" marker-end="url(#arrow)"/><line x1="500" x2="367" y1="160" y2="235" stroke="#37474f" stroke-width="1.5" marker-end="url(#arrow)"/><line x1="815" x2="830" y1="160" y2="235" stroke="#37474f" stroke-dasharray="4 3" stroke-width="1.5" marker-end="url(#arrow)"/><line x1="245" x2="270" y1="282" y2="282" stroke="#37474f" stroke-width="1.5" marker-end="url(#arrow)"/><line x1="465" x2="490" y1="282" y2="282" stroke="#37474f" stroke-width="1.5" marker-end="url(#arrow)"/><line x1="685" x2="710" y1="282" y2="282" stroke="#37474f" stroke-width="1.5" marker-end="url(#arrow)"/><line x1="367" x2="265" y1="330" y2="420" stroke="#37474f" stroke-width="1.5" marker-end="url(#arrow)"/><line x1="587" x2="265" y1="330" y2="420" stroke="#37474f" stroke-width="1.5" marker-end="url(#arrow)"/><line x1="147" x2="730" y1="330" y2="420" stroke="#37474f" stroke-width="1.5" marker-end="url(#arrow)"/><text x="970" y="595" fill="#90a4ae" font-size="9" font-style="italic" text-anchor="end">Figure 2</text></svg>