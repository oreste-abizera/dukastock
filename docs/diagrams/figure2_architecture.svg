<svg viewBox="0 0 1000 620" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#37474f"/>
    </marker>
  </defs>

  <text x="500" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#0d1f15">DukaStock System Architecture Overview</text>

  <!-- Frontend / Input layer -->
  <rect x="30" y="60" width="940" height="110" rx="8" fill="#eaf6ee" stroke="#1a6e3c" stroke-width="1.5"/>
  <text x="50" y="82" font-size="13" font-weight="bold" fill="#0d1f15">Frontend / Input Layer</text>

  <rect x="50" y="95" width="270" height="65" rx="6" fill="#ffffff" stroke="#25a65a" stroke-width="1.5"/>
  <text x="185" y="118" text-anchor="middle" font-size="13" font-weight="bold">WhatsApp</text>
  <text x="185" y="135" text-anchor="middle" font-size="11" fill="#455a64">Twilio sandbox</text>
  <text x="185" y="150" text-anchor="middle" font-size="10" fill="#607d8b">Conversational sales logging (NLP)</text>

  <rect x="365" y="95" width="270" height="65" rx="6" fill="#ffffff" stroke="#25a65a" stroke-width="1.5"/>
  <text x="500" y="118" text-anchor="middle" font-size="13" font-weight="bold">USSD</text>
  <text x="500" y="135" text-anchor="middle" font-size="11" fill="#455a64">Africa's Talking (MTN / Airtel RW)</text>
  <text x="500" y="150" text-anchor="middle" font-size="10" fill="#607d8b">Structured Kinyarwanda FSM menu, no NLP</text>

  <rect x="680" y="95" width="270" height="65" rx="6" fill="#ffffff" stroke="#25a65a" stroke-width="1.5"/>
  <text x="815" y="118" text-anchor="middle" font-size="13" font-weight="bold">SMS (outbound)</text>
  <text x="815" y="135" text-anchor="middle" font-size="11" fill="#455a64">Africa's Talking</text>
  <text x="815" y="150" text-anchor="middle" font-size="10" fill="#607d8b">Weekly restock summaries</text>

  <!-- Backend layer -->
  <rect x="30" y="200" width="940" height="150" rx="8" fill="#e8f0fe" stroke="#1565c0" stroke-width="1.5"/>
  <text x="50" y="222" font-size="13" font-weight="bold" fill="#0d1f15">Backend (FastAPI, single shared service)</text>

  <rect x="50" y="235" width="195" height="95" rx="6" fill="#ffffff" stroke="#1565c0" stroke-width="1.5"/>
  <text x="147" y="258" text-anchor="middle" font-size="12" font-weight="bold">Webhook Router</text>
  <text x="147" y="276" text-anchor="middle" font-size="10" fill="#455a64">Async Twilio +</text>
  <text x="147" y="290" text-anchor="middle" font-size="10" fill="#455a64">Africa's Talking</text>
  <text x="147" y="304" text-anchor="middle" font-size="10" fill="#455a64">event handling</text>

  <rect x="270" y="235" width="195" height="95" rx="6" fill="#ffffff" stroke="#1565c0" stroke-width="1.5"/>
  <text x="367" y="258" text-anchor="middle" font-size="12" font-weight="bold">NLP Parser</text>
  <text x="367" y="276" text-anchor="middle" font-size="10" fill="#455a64">XLM-R (fine-tuned)</text>
  <text x="367" y="290" text-anchor="middle" font-size="10" fill="#455a64">+ RapidFuzz fallback</text>
  <text x="367" y="304" text-anchor="middle" font-size="10" fill="#455a64">WhatsApp only</text>

  <rect x="490" y="235" width="195" height="95" rx="6" fill="#ffffff" stroke="#1565c0" stroke-width="1.5"/>
  <text x="587" y="258" text-anchor="middle" font-size="12" font-weight="bold">Forecasting Service</text>
  <text x="587" y="276" text-anchor="middle" font-size="10" fill="#455a64">joblib-serialized</text>
  <text x="587" y="290" text-anchor="middle" font-size="10" fill="#455a64">per-product models</text>
  <text x="587" y="304" text-anchor="middle" font-size="10" fill="#455a64">(SerializableForecastModel)</text>

  <rect x="710" y="235" width="240" height="95" rx="6" fill="#ffffff" stroke="#1565c0" stroke-width="1.5"/>
  <text x="830" y="258" text-anchor="middle" font-size="12" font-weight="bold">Response Formatter</text>
  <text x="830" y="276" text-anchor="middle" font-size="10" fill="#455a64">Kinyarwanda responses</text>
  <text x="830" y="290" text-anchor="middle" font-size="10" fill="#455a64">USSD: 182 chars max</text>
  <text x="830" y="304" text-anchor="middle" font-size="10" fill="#455a64">SMS: 160 chars max</text>

  <!-- Database layer -->
  <rect x="30" y="385" width="940" height="110" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="1.5"/>
  <text x="50" y="407" font-size="13" font-weight="bold" fill="#0d1f15">Database Layer</text>

  <rect x="50" y="420" width="430" height="65" rx="6" fill="#ffffff" stroke="#e65100" stroke-width="1.5"/>
  <text x="265" y="443" text-anchor="middle" font-size="13" font-weight="bold">Supabase (PostgreSQL)</text>
  <text x="265" y="460" text-anchor="middle" font-size="10" fill="#455a64">Sales logs, shopkeeper profiles, forecast results</text>
  <text x="265" y="473" text-anchor="middle" font-size="10" fill="#bf360c">Phone numbers hashed to UUID (Law No. 058/2021)</text>

  <rect x="510" y="420" width="440" height="65" rx="6" fill="#ffffff" stroke="#e65100" stroke-width="1.5"/>
  <text x="730" y="443" text-anchor="middle" font-size="13" font-weight="bold">Redis (Upstash)</text>
  <text x="730" y="460" text-anchor="middle" font-size="10" fill="#455a64">USSD session state persistence</text>
  <text x="730" y="473" text-anchor="middle" font-size="10" fill="#455a64">180-second TTL (matches MTN/Airtel timeout window)</text>

  <!-- Infrastructure layer -->
  <rect x="30" y="525" width="940" height="75" rx="8" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.5"/>
  <text x="50" y="547" font-size="13" font-weight="bold" fill="#0d1f15">Infrastructure</text>
  <text x="50" y="568" font-size="11" fill="#455a64">Railway.app (always-on hosting — avoids Render.com's cold-start latency, which would breach USSD's 3-second response SLA)</text>
  <text x="50" y="585" font-size="11" fill="#455a64">GitHub Actions CI on push to main (lint, 73 unit tests, Docker build; deploy to Railway is manual)</text>

  <!-- Arrows: frontend -> backend -->
  <line x1="185" y1="160" x2="185" y2="235" stroke="#37474f" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="500" y1="160" x2="367" y2="235" stroke="#37474f" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="815" y1="160" x2="830" y2="235" stroke="#37474f" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="4,3"/>

  <!-- Arrows: backend internal flow -->
  <line x1="245" y1="282" x2="270" y2="282" stroke="#37474f" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="465" y1="282" x2="490" y2="282" stroke="#37474f" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="685" y1="282" x2="710" y2="282" stroke="#37474f" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Arrows: backend -> database -->
  <line x1="367" y1="330" x2="265" y2="420" stroke="#37474f" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="587" y1="330" x2="265" y2="420" stroke="#37474f" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="147" y1="330" x2="730" y2="420" stroke="#37474f" stroke-width="1.5" marker-end="url(#arrow)"/>

  <text x="970" y="595" text-anchor="end" font-size="9" fill="#90a4ae" font-style="italic">Figure 2</text>
</svg>
