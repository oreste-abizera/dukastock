<svg viewBox="0 0 950 460" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="crow" markerWidth="14" markerHeight="14" refX="12" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 M0,6 L12,6" fill="none" stroke="#37474f" stroke-width="1.2"/>
    </marker>
  </defs>

  <text x="475" y="28" text-anchor="middle" font-size="20" font-weight="bold" fill="#0d1f15">Entity-Relationship Diagram</text>

  <!-- shopkeeper_profiles (center) -->
  <g transform="translate(370,55)">
    <rect width="210" height="90" fill="#eaf6ee" stroke="#1a6e3c" stroke-width="2"/>
    <rect width="210" height="26" fill="#1a6e3c"/>
    <text x="105" y="18" text-anchor="middle" font-size="13" font-weight="bold" fill="white">shopkeeper_profiles</text>
    <line x1="0" y1="26" x2="210" y2="26" stroke="#1a6e3c"/>
    <text x="10" y="44" font-size="11" font-weight="bold">PK  uuid</text>
    <text x="10" y="61" font-size="10" fill="#455a64">channel_preference</text>
    <text x="10" y="76" font-size="10" fill="#455a64">locale</text>
  </g>

  <!-- sales_logs -->
  <g transform="translate(60,250)">
    <rect width="220" height="120" fill="#e8f0fe" stroke="#1565c0" stroke-width="2"/>
    <rect width="220" height="26" fill="#1565c0"/>
    <text x="110" y="18" text-anchor="middle" font-size="13" font-weight="bold" fill="white">sales_logs</text>
    <line x1="0" y1="26" x2="220" y2="26" stroke="#1565c0"/>
    <text x="10" y="44" font-size="11" font-weight="bold">PK  uuid</text>
    <text x="10" y="61" font-size="11" font-weight="bold">FK  shopkeeper_id</text>
    <text x="10" y="78" font-size="10" fill="#455a64">product_code, quantity,</text>
    <text x="10" y="93" font-size="10" fill="#455a64">unit, channel,</text>
    <text x="10" y="108" font-size="10" fill="#455a64">logged_at</text>
  </g>

  <!-- forecast_results -->
  <g transform="translate(355,250)">
    <rect width="240" height="135" fill="#fff3e0" stroke="#e65100" stroke-width="2"/>
    <rect width="240" height="26" fill="#e65100"/>
    <text x="120" y="18" text-anchor="middle" font-size="13" font-weight="bold" fill="white">forecast_results</text>
    <line x1="0" y1="26" x2="240" y2="26" stroke="#e65100"/>
    <text x="10" y="44" font-size="11" font-weight="bold">PK  uuid</text>
    <text x="10" y="61" font-size="11" font-weight="bold">FK  shopkeeper_id</text>
    <text x="10" y="78" font-size="10" fill="#455a64">product_code, predicted_quantity,</text>
    <text x="10" y="93" font-size="10" fill="#455a64">lower_bound, upper_bound,</text>
    <text x="10" y="108" font-size="10" fill="#455a64">model_used, data_density_pct,</text>
    <text x="10" y="123" font-size="10" fill="#455a64">generated_at</text>
  </g>

  <!-- ussd_sessions -->
  <g transform="translate(660,250)">
    <rect width="230" height="105" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2"/>
    <rect width="230" height="26" fill="#6a1b9a"/>
    <text x="115" y="18" text-anchor="middle" font-size="13" font-weight="bold" fill="white">ussd_sessions</text>
    <line x1="0" y1="26" x2="230" y2="26" stroke="#6a1b9a"/>
    <text x="10" y="44" font-size="11" font-weight="bold">PK  session_id</text>
    <text x="10" y="61" font-size="11" font-weight="bold">FK  shopkeeper_id</text>
    <text x="10" y="78" font-size="10" fill="#455a64">state, last_active</text>
  </g>

  <!-- Relationship lines with crow's foot (one-to-many) -->
  <line x1="430" y1="145" x2="220" y2="250" stroke="#37474f" stroke-width="1.5" marker-end="url(#crow)"/>
  <text x="320" y="195" font-size="11" fill="#37474f" font-style="italic">has many</text>

  <line x1="475" y1="145" x2="475" y2="250" stroke="#37474f" stroke-width="1.5" marker-end="url(#crow)"/>
  <text x="485" y="200" font-size="11" fill="#37474f" font-style="italic">has many</text>

  <line x1="520" y1="145" x2="730" y2="250" stroke="#37474f" stroke-width="1.5" marker-end="url(#crow)"/>
  <text x="600" y="195" font-size="11" fill="#37474f" font-style="italic">has many</text>

  <!-- Dependency note: forecast_results depends on sales_logs -->
  <line x1="170" y1="370" x2="170" y2="400" stroke="#90a4ae" stroke-width="1.3" stroke-dasharray="5,3"/>
  <line x1="170" y1="400" x2="475" y2="400" stroke="#90a4ae" stroke-width="1.3" stroke-dasharray="5,3"/>
  <line x1="475" y1="400" x2="475" y2="387" stroke="#90a4ae" stroke-width="1.3" stroke-dasharray="5,3" marker-end="url(#crow)"/>
  <text x="320" y="420" text-anchor="middle" font-size="10" fill="#607d8b" font-style="italic">forecast_results is computed on demand from accumulated sales_logs history, not stored per individual log entry</text>

  <text x="920" y="445" text-anchor="end" font-size="9" fill="#90a4ae" font-style="italic">Figure 6</text>
</svg>
