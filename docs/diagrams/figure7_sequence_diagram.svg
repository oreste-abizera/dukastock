<svg xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif" viewBox="0 0 1000 700"><defs><marker id="arrowSeq" markerHeight="10" markerUnits="strokeWidth" markerWidth="10" orient="auto" refX="8" refY="3"><path fill="#37474f" d="M0,0 L8,3 L0,6 Z"/></marker><marker id="arrowSeqOpen" markerHeight="10" markerUnits="strokeWidth" markerWidth="10" orient="auto" refX="8" refY="3"><path fill="none" stroke="#37474f" stroke-width="1.3" d="M0,0 L8,3 L0,6"/></marker></defs><text x="500" y="26" fill="#0d1f15" font-size="20" font-weight="bold" text-anchor="middle">Sequence Diagram: WhatsApp Sales Logging and Restock Advice</text><g font-size="11.5" font-weight="bold" text-anchor="middle"><rect width="130" height="40" x="20" y="50" fill="#1a6e3c" rx="5"/><text x="85" y="74" fill="#fff">Duka Operator</text><rect width="130" height="40" x="195" y="50" fill="#25a65a" rx="5"/><text x="260" y="68" fill="#fff">WhatsApp /</text><text x="260" y="82" fill="#fff">Twilio</text><rect width="130" height="40" x="370" y="50" fill="#1565c0" rx="5"/><text x="435" y="68" fill="#fff">FastAPI</text><text x="435" y="82" fill="#fff">Backend</text><rect width="140" height="40" x="545" y="50" fill="#6a1b9a" rx="5"/><text x="615" y="68" fill="#fff">NLP Parser</text><text x="615" y="82" fill="#fff">Service</text><rect width="140" height="40" x="730" y="50" fill="#e65100" rx="5"/><text x="800" y="68" fill="#fff">Forecasting</text><text x="800" y="82" fill="#fff">Service</text><rect width="80" height="40" x="900" y="50" fill="#37474f" rx="5"/><text x="940" y="68" fill="#fff">Supabase</text><text x="940" y="82" fill="#fff">DB</text></g><g stroke="#b0bec5" stroke-dasharray="3 3" stroke-width="1.3"><line x1="85" x2="85" y1="90" y2="670"/><line x1="260" x2="260" y1="90" y2="670"/><line x1="435" x2="435" y1="90" y2="670"/><line x1="615" x2="615" y1="90" y2="670"/><line x1="800" x2="800" y1="90" y2="670"/><line x1="940" x2="940" y1="90" y2="670"/></g><g fill="#263238" font-size="10.5"><line x1="85" x2="255" y1="120" y2="120" stroke="#37474f" stroke-width="1.3" marker-end="url(#arrowSeq)"/><text x="170" y="113" text-anchor="middle">1. Sends Kinyarwanda message</text><line x1="260" x2="430" y1="150" y2="150" stroke="#37474f" stroke-width="1.3" marker-end="url(#arrowSeq)"/><text x="345" y="143" text-anchor="middle">2. Webhook POST</text><line x1="435" x2="610" y1="180" y2="180" stroke="#37474f" stroke-width="1.3" marker-end="url(#arrowSeq)"/><text x="520" y="173" text-anchor="middle">3. Parse(raw_message)</text><line x1="615" x2="440" y1="210" y2="210" stroke="#37474f" stroke-dasharray="6 3" stroke-width="1.3" marker-end="url(#arrowSeqOpen)"/><text x="520" y="203" text-anchor="middle">4. product_name, quantity</text><line x1="435" x2="935" y1="240" y2="240" stroke="#37474f" stroke-width="1.3" marker-end="url(#arrowSeq)"/><text x="685" y="233" text-anchor="middle">5. Write sale record (SalesLog)</text><line x1="435" x2="795" y1="280" y2="280" stroke="#37474f" stroke-width="1.3" marker-end="url(#arrowSeq)"/><text x="615" y="273" text-anchor="middle">6. Forecast(shopkeeper_uuid, product_id)</text><line x1="800" x2="945" y1="310" y2="310" stroke="#37474f" stroke-width="1.3" marker-end="url(#arrowSeq)"/><text x="870" y="303" font-size="9.5" text-anchor="middle">7. Read recent sales history</text><line x1="940" x2="805" y1="340" y2="340" stroke="#37474f" stroke-dasharray="6 3" stroke-width="1.3" marker-end="url(#arrowSeqOpen)"/><text x="870" y="333" font-size="9.5" text-anchor="middle">8. Sales history rows</text><rect width="160" height="35" x="800" y="355" fill="#fff3e0" stroke="#e65100" stroke-width="1" rx="4"/><text x="880" y="376" font-size="9.5" text-anchor="middle">9. Run serialized model</text><line x1="800" x2="440" y1="410" y2="410" stroke="#37474f" stroke-dasharray="6 3" stroke-width="1.3" marker-end="url(#arrowSeqOpen)"/><text x="615" y="403" text-anchor="middle">10. predicted_quantity, confidence interval</text><rect width="200" height="35" x="435" y="425" fill="#e8f0fe" stroke="#1565c0" stroke-width="1" rx="4"/><text x="535" y="446" font-size="9.5" text-anchor="middle">11. Format Kinyarwanda response</text><line x1="435" x2="265" y1="480" y2="480" stroke="#37474f" stroke-width="1.3" marker-end="url(#arrowSeq)"/><text x="350" y="473" text-anchor="middle">12. Send response</text><line x1="260" x2="90" y1="510" y2="510" stroke="#37474f" stroke-width="1.3" marker-end="url(#arrowSeq)"/><text x="170" y="503" text-anchor="middle">13. Delivers message</text></g><rect width="500" height="100" x="370" y="545" fill="#fff8e1" stroke="#f9a825" stroke-dasharray="4 2" stroke-width="1.3" rx="6"/><text x="385" y="565" fill="#5d4037" font-size="10.5" font-weight="bold">Note: USSD channel does not include steps 3-4.</text><text x="385" y="582" fill="#5d4037" font-size="10">USSD input is structured (digit-based FSM menu selection),</text><text x="385" y="597" fill="#5d4037" font-size="10">so it writes directly to SalesLog without invoking the NLP</text><text x="385" y="612" fill="#5d4037" font-size="10">Parser Service at all — see app/channels/ussd/fsm.py and</text><text x="385" y="627" fill="#5d4037" font-size="10">the Use Case Diagram (Figure 4) note on the same point.</text><text x="970" y="690" fill="#90a4ae" font-size="9" font-style="italic" text-anchor="end">Figure 7</text></svg>